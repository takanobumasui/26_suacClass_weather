<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>時計と天気</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="card">
    <!-- 時計を表示する箱 -->
    <div id="clock">--:--:--</div>

    <!-- 天気を表示する箱 -->
    <div class="weather">
      <div id="weather-icon">☀️</div>
      <div id="temperature">--℃</div>
      <div id="weather-status">読み込み中...</div>
    </div>
  </div>

  <!-- JavaScriptファイルの読み込み(bodyの一番下に置くのがポイント) -->
  <script src="script.js"></script>
</body>
</html>
